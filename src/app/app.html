<div class="app-container" [class.initialized]="isInitialized">
  <header class="nav-container">
    <div class="nav-content">
      <a routerLink="/" class="nav-logo" aria-label="Beyondoc Home">
        <img
          src="assets/branding/logo-beyondoc.svg"
          alt="Beyondoc"
          class="nav-logo-image"
        />
      </a>
      <nav class="nav-menu" aria-label="Navigazione principale">
        <a
          routerLink="/"
          class="nav-link"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          #homeLink="routerLinkActive"
          [attr.aria-current]="homeLink.isActive ? 'page' : null"
          >Home</a
        >
        <a
          routerLink="/monthly-report"
          class="nav-link"
          routerLinkActive="active"
          #monthlyLink="routerLinkActive"
          [attr.aria-current]="monthlyLink.isActive ? 'page' : null"
          >Report Mensile</a
        >
        <a
          routerLink="/extracts"
          class="nav-link"
          routerLinkActive="active"
          #extractsLink="routerLinkActive"
          [attr.aria-current]="extractsLink.isActive ? 'page' : null"
          >Elenco Estratti</a
        >
        <a
          routerLink="/export-history"
          class="nav-link"
          routerLinkActive="active"
          #historyLink="routerLinkActive"
          [attr.aria-current]="historyLink.isActive ? 'page' : null"
          >Storico Esportazioni</a
        >
      </nav>
      <div class="nav-info">
        <div class="app-version">v0.1.0-beta.4</div>
        <div class="app-year">(c) {{ currentYear }}</div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
